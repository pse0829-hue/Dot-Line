<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found Alphabet — Archive</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/wanteddev/wanted-sans@v1.0.1/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#000000; --y:#f2d94e; --yd:#7a6e1a;
  --panel:#090908;
}
body{
  background:var(--bg); color:var(--y);
  font-family:'Wanted Sans Variable','Wanted Sans',sans-serif;
  overflow:hidden; width:100vw; height:100vh; cursor:crosshair;
}

/* ── STARFIELD ── */
#sf{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── INTRO VIDEO ── */
#intro-vid{
  position:fixed;inset:0;z-index:11;
  width:100%;height:100%;
  object-fit:contain;background:#000000;
  display:block;transition:opacity 1s;
  cursor:default;
}

#ui{position:fixed;inset:0;z-index:20;pointer-events:none;transition:opacity 1s;}
#tl{position:absolute;top:36px;left:40px;font-size:9px;letter-spacing:.2em;color:var(--yd);line-height:1.9;text-transform:uppercase;pointer-events:auto;}
#tr{position:absolute;top:36px;right:40px;font-size:9px;letter-spacing:.14em;color:var(--yd);text-align:right;line-height:1.9;text-transform:uppercase;}
#hint{
  position:absolute;bottom:88px;left:50%;transform:translateX(-50%);
  font-size:11px;letter-spacing:.22em;color:var(--y);
  white-space:nowrap;text-transform:uppercase;transition:opacity .6s;
  display:flex;align-items:center;gap:8px;
}
#hint::after{
  content:'';display:inline-block;
  width:7px;height:7px;border-radius:50%;
  background:var(--y);
  box-shadow:0 0 8px 2px rgba(242,217,78,.6);
  animation:blink 1.1s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.25;transform:scale(.7);}}
#enter{
  position:absolute;bottom:44px;left:50%;transform:translateX(-50%);
  font-size:22px;letter-spacing:.25em;color:var(--y);
  cursor:crosshair;opacity:0;
  transition:opacity 1.2s,text-shadow .3s;
  text-transform:uppercase;pointer-events:none;white-space:nowrap;
}
#enter.show{opacity:1;pointer-events:auto;text-shadow:0 0 18px rgba(242,217,78,.75),0 0 44px rgba(242,217,78,.35);}
#enter:hover{text-shadow:0 0 24px rgba(242,217,78,1),0 0 60px rgba(242,217,78,.5);}

/* ── ARCHIVE ── */
#archive{position:fixed;inset:0;z-index:10;opacity:0;pointer-events:none;transition:opacity 1.2s;}
#archive.visible{opacity:1;pointer-events:all;}
#ac{position:absolute;inset:0;width:100%;height:100%;}

/* Header */
#arch-hdr{position:absolute;top:36px;left:40px;z-index:30;cursor:pointer;}
.hdr-t{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--y);line-height:1.7;}
.hdr-s{font-size:8px;letter-spacing:.12em;color:var(--yd);margin-top:5px;}

/* Controls */
#arch-ctrl{position:absolute;top:36px;right:40px;z-index:30;display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
.view-row{display:flex;gap:2px;}
.vtoggle{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--yd);cursor:crosshair;padding:7px 18px;border:1px solid transparent;background:transparent;font-family:'Wanted Sans Variable','Wanted Sans',sans-serif;transition:all .2s;border-radius:999px;}
.vtoggle.active{color:var(--bg);background:var(--y);}
.vtoggle:hover:not(.active){color:var(--y);border-color:var(--yd);}

/* Media sub-toggles */
#media-filter{display:none;flex-wrap:wrap;gap:2px;justify-content:flex-end;max-width:280px;}
#media-filter.show{display:flex;}
.mf-btn{font-size:7px;letter-spacing:.15em;text-transform:uppercase;color:var(--yd);cursor:crosshair;padding:5px 10px;border:1px solid var(--yd);background:transparent;font-family:'Wanted Sans Variable','Wanted Sans',sans-serif;transition:all .2s;}
.mf-btn:hover{color:var(--y);border-color:var(--y);}
.mf-btn.active{color:var(--bg);background:var(--y);border-color:var(--y);}

#ctrl-hint{font-size:7px;letter-spacing:.1em;color:var(--yd);}
#clear-btn{font-size:7px;letter-spacing:.13em;text-transform:uppercase;color:var(--yd);cursor:crosshair;background:none;border:none;font-family:'Wanted Sans Variable','Wanted Sans',sans-serif;opacity:0;transition:opacity .3s,color .2s;}
#clear-btn.show{opacity:1;}
#clear-btn:hover{color:var(--y);}

/* Big background medium label */
#bg-label{display:none;}

/* Footer */
#arch-foot{position:absolute;bottom:36px;left:40px;z-index:30;font-size:8px;letter-spacing:.1em;color:var(--yd);line-height:1.9;}

/* ── NODES ── */
#nw{position:absolute;inset:0;z-index:25;}
.node{position:absolute;cursor:crosshair;transform:translate(-50%,-50%);z-index:25;transition:opacity .5s;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;}
.ndot{width:6px;height:6px;background:var(--y);border-radius:50%;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;flex-shrink:0;}
.node:hover .ndot{transform:scale(2.2);box-shadow:0 0 14px 4px rgba(242,217,78,.5);}
.node.selected .ndot{transform:scale(2);box-shadow:0 0 20px 6px rgba(242,217,78,.6);}
.nnum{display:none;}
.nname{position:absolute;bottom:-14px;left:9px;font-size:9.5px;letter-spacing:.07em;color:var(--yd);white-space:nowrap;pointer-events:none;transition:color .2s;}
.node:hover .nname,.node.selected .nname{color:var(--y);}

/* ── HOVER THUMBNAIL ── */
#thumb-tip{position:fixed;z-index:80;pointer-events:none;opacity:0;transition:opacity .15s ease;}
#thumb-tip.show{opacity:1;}
.ttbox{width:88px;height:88px;background:#131310;border:1px solid var(--yd);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:6px;letter-spacing:.12em;color:#333320;text-transform:uppercase;}
.ttbox img{width:100%;height:100%;object-fit:cover;}

/* ── CARD VIEW (by medium) ── */
.dot-view{display:flex;align-items:center;justify-content:center;width:100%;height:100%;position:relative;}
.card-view{display:none;width:120px;cursor:crosshair;}
.card-thumb{width:100%;aspect-ratio:3/2;background:#141410;border:1px solid #252518;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color .2s,aspect-ratio .2s;}
#archive.poster-mode .card-thumb{aspect-ratio:1/1.414;}
#archive.video-mode .card-view{width:155px;}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.card-ph{font-size:7px;letter-spacing:.18em;color:#2a2a14;text-transform:uppercase;}
.card-meta{padding:6px 2px 0;}
.card-type{font-size:6px;letter-spacing:.2em;color:var(--yd);text-transform:uppercase;margin-bottom:2px;}
.card-title{font-size:8px;letter-spacing:.06em;color:var(--y);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-name{font-size:7px;letter-spacing:.07em;color:var(--yd);margin-top:2px;opacity:.7;}
/* view switching */
#archive.view-medium .node{width:auto;height:auto;}
#archive.view-medium .dot-view{display:none;}
#archive.view-medium .card-view{display:block;}
#archive.view-medium .node:hover .card-thumb{border-color:var(--yd);}
#archive.view-medium .node.selected .card-thumb{border-color:var(--y);}
/* card fade on media switch */
.card-view{transition:opacity .18s ease;}
.card-view.fade{opacity:0;}

/* ── RIGHT SIDE PANEL (by person) ── */
#detail{
  position:fixed;top:0;right:0;bottom:0;width:360px;
  background:var(--panel);border-left:1px solid #1e1e12;
  z-index:40;transform:translateX(100%);
  transition:transform .55s cubic-bezier(.16,1,.3,1);
  overflow-y:auto;padding:64px 36px 60px;
}
#detail.open{transform:translateX(0);}
#detail::-webkit-scrollbar{width:1px;}
#detail::-webkit-scrollbar-thumb{background:var(--yd);}
#det-x{display:none;position:absolute;top:22px;right:26px;font-size:16px;cursor:crosshair;color:var(--yd);transition:color .2s;}
#det-x:hover{color:var(--y);}
#det-num{display:none;}
#det-name{font-size:13px;letter-spacing:.12em;color:var(--y);margin-bottom:28px;padding-bottom:14px;border-bottom:1px solid #1e1e12;}
.wi{margin-bottom:26px;cursor:crosshair;transition:opacity .2s;}
.wi:hover{opacity:.75;}
.wthumb{width:100%;aspect-ratio:3/2;background:#141410;border:1px solid #1e1e12;display:flex;align-items:center;justify-content:center;font-size:7px;letter-spacing:.18em;color:#2a2a14;text-transform:uppercase;margin-bottom:7px;position:relative;overflow:hidden;}
.wthumb img{width:100%;height:100%;object-fit:cover;}
.wthumb::after{content:'';position:absolute;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(242,217,78,.01) 3px,rgba(242,217,78,.01) 4px);}
.wtype{font-size:7px;letter-spacing:.22em;color:var(--yd);text-transform:uppercase;margin-bottom:3px;}
.wtitle{font-size:9px;letter-spacing:.07em;color:var(--y);}
/* detail panel content fade */
#det-inner{transition:opacity .16s ease;}
#det-inner.fade{opacity:0;}

/* ── CENTERED MODAL (by medium) ── */
#modal{
  position:fixed;inset:0;z-index:90;
  background:rgba(9,9,8,.92);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .4s ease;
}
#modal.open{opacity:1;pointer-events:all;}
#modal-inner{position:relative;max-width:820px;width:90vw;}
#modal-close{
  position:absolute;top:-36px;right:0;
  font-size:13px;letter-spacing:.2em;color:var(--yd);
  cursor:crosshair;text-transform:uppercase;transition:color .2s;
}
#modal-close:hover{color:var(--y);}
#modal-media{
  width:100%;background:#0f0f0c;border:1px solid #252518;
  min-height:200px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
#modal-media iframe{width:100%;aspect-ratio:16/9;border:none;display:block;}
.poster-player{position:relative;cursor:pointer;display:block;}
.poster-player:hover .pp-hint{opacity:1;}
.pp-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(242,217,78,.9);opacity:0;transition:opacity .2s;pointer-events:none;text-shadow:0 0 20px rgba(242,217,78,.5);}
#modal-media img{width:100%;height:auto;display:block;max-height:75vh;object-fit:contain;}
#modal-media video{width:100%;height:auto;display:block;max-height:75vh;object-fit:contain;}
#modal-media video::-webkit-media-controls,
#modal-media video::-webkit-media-controls-panel,
#modal-media video::-webkit-media-controls-play-button,
#modal-media video::-webkit-media-controls-start-playback-button{display:none!important;-webkit-appearance:none;}
#modal-media .ph{font-size:9px;letter-spacing:.18em;color:#2a2a14;text-transform:uppercase;}
#modal-info{margin-top:16px;display:flex;justify-content:space-between;align-items:flex-end;}
.mi-name{font-size:13px;letter-spacing:.12em;color:var(--y);}
.mi-type{font-size:8px;letter-spacing:.2em;color:var(--yd);text-transform:uppercase;}
.mi-title{font-size:9px;letter-spacing:.08em;color:var(--yd);margin-top:3px;}
#modal-nav{display:flex;gap:10px;align-items:center;}
.mn-dot{width:5px;height:5px;border-radius:50%;background:var(--yd);transition:background .2s,transform .2s;}
.mn-dot.active{background:var(--y);transform:scale(1.5);}
/* modal arrows */
.modal-arrow{
  position:absolute;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:crosshair;
  padding:24px 20px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .2s;
  opacity:.45;
}
.modal-arrow:hover{opacity:1;}
.modal-arrow.hidden{opacity:0;pointer-events:none;}
.modal-arrow::before{
  content:'';display:block;
  width:14px;height:14px;
  border-right:1.5px solid var(--y);
  border-top:1.5px solid var(--y);
}
#modal-prev{right:calc(100% + 8px);}
#modal-prev::before{transform:rotate(-135deg);margin-left:5px;}
#modal-next{left:calc(100% + 8px);}
#modal-next::before{transform:rotate(45deg);margin-right:5px;}

/* ── MOBILE ── */
@media(max-width:768px){
  body{cursor:default;}
  #tl,#tr{font-size:8px;top:20px;}
  #tl{left:16px;}#tr{right:16px;}
  #enter{font-size:16px;bottom:36px;}

  #arch-hdr{top:20px;left:16px;}
  .hdr-t{font-size:9px;}

  #arch-ctrl{top:20px;right:16px;gap:6px;}
  .vtoggle{font-size:7px;padding:5px 10px;}
  .mf-btn{font-size:6px;padding:4px 8px;}

  #det-x{display:block;}
  #detail{width:100vw;padding:52px 20px 40px;}

  #modal-inner{width:96vw;}
  #modal-media iframe{aspect-ratio:auto;max-height:55vh;}
  #modal-media video{max-height:55vh;}
  #modal-media img{max-height:55vh;}
  #modal-prev{right:auto;left:-2px;top:auto;bottom:-44px;transform:none;padding:12px;}
  #modal-next{left:auto;right:-2px;top:auto;bottom:-44px;transform:none;padding:12px;}
  .mi-name{font-size:11px;}

  .nname{display:none;}
  .node{width:24px;height:24px;}
  .ndot{width:5px;height:5px;}

  /* medium view: 스크롤 컨테이너 */
  #archive.view-medium #nw{
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    position:absolute;inset:80px 0 0 0;
    height:calc(100% - 80px);
  }
  #archive.view-medium #ac{display:none;}
  #archive.view-medium .node{transform:translate(-50%,0);} /* 모바일: 위 기준 정렬 */
}
</style>
</head>
<body>

<canvas id="sf"></canvas>
<video id="intro-vid" autoplay muted playsinline src="KakaoTalk_Video_2026-06-18-08-31-07.mp4"></video>

<!-- INTRO UI -->
<div id="ui">
  <div id="tl">Type &amp; Media<br>Kookmin University</div>

</div>

<!-- ARCHIVE -->
<div id="archive">
  <canvas id="ac"></canvas>

  <div id="bg-label"><span id="bg-text"></span></div>

  <div id="arch-hdr">
    <div class="hdr-t">Found Alphabet<br>Archive</div>
    <div class="hdr-s" id="hdr-sub">18 artists · 72 works</div>
  </div>

  <div id="arch-ctrl">
    <div class="view-row">
      <button class="vtoggle active" id="vt-p" onclick="setView('person')">by person</button>
      <button class="vtoggle"        id="vt-m" onclick="setView('medium')">by medium</button>
    </div>
    <div id="media-filter">
      <button class="mf-btn" data-m="영상"   onclick="setMedia('영상')">영상</button>
      <button class="mf-btn" data-m="포스터" onclick="setMedia('포스터')">포스터</button>
    </div>

</div>

<!-- HOVER THUMBNAIL -->

    <div id="modal-info">
      <div>
        <div class="mi-name" id="mi-name"></div>
        <div class="mi-type" id="mi-type"></div>
        <div class="mi-title" id="mi-title"></div>
      </div>
      <div id="modal-nav"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  DATA — 아티스트 정보 여기서 수정
// ══════════════════════════════════════════════
const MEDIA = ['영상','포스터'];

// works.thumb: 이미지 경로 or null
// works.src:   영상/무빙포스터의 경우 구글드라이브 파일ID or 전체 URL
// 구글드라이브 embed: https://drive.google.com/file/d/FILE_ID/preview
const ARTIST_NAMES = [
  '김도윤','김민경','김서진','김시현','김지원','김규현',
  '박세은','박신영','박예성','오채원','원준희',
  '장지은','전혜영','조윤아','최안드레이','현병수','형이룸'
];
const ARTISTS = ARTIST_NAMES.map((name,i)=>({
  id:i+1, num:String(i+1).padStart(2,'0'),
  name,
  works: MEDIA.map(type=>({
    type,
    title:'작품 제목',
    thumb: null,
    src:   null,
  }))
}));

// ══════════════════════════════════════════════
//  DRIVE CONFIG
//  Apps Script 배포 후 URL을 DRIVE_SCRIPT_URL에 붙여넣기
// ══════════════════════════════════════════════
const DRIVE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzog_sHsscug_oUItlgSwxaJJo3cZSZWBGOA81cO4c_aSnQrQ8Nmt9BIcA0Q8R-RbUvzA/exec';

function applyDriveData(data){
  if(data.error){ console.warn('[Drive] script error:', data.error); return; }
  // macOS NFD → NFC 정규화 (한글 파일명 호환)
  var ndata = {};
  Object.keys(data).forEach(function(k){
    ndata[k.normalize('NFC')] = data[k];
    ndata[k.normalize('NFD')] = data[k];
  });
  ARTISTS.forEach(function(artist){
    var d = ndata[artist.name.normalize('NFC')] || ndata[artist.name.normalize('NFD')];
    if(!d) return;
    if(d.title) artist.works.forEach(function(w){ w.title = d.title; });
    artist.works.forEach(function(w){
      var f = d.files && d.files[w.type];
      if(!f) return;
      w.thumb = 'https://drive.google.com/thumbnail?id=' + f.id + '&sz=w400';
      if(f.isVideo){
        w.src = 'https://drive.google.com/file/d/' + f.id + '/preview';
        w.directSrc = 'https://drive.usercontent.google.com/download?id=' + f.id + '&export=download&authuser=0&confirm=t';
      }
    });
  });
  // 인트로 영상 설정
  var intro = data['__intro__'];
  if(intro && intro.id){
    var vid = document.getElementById('intro-vid');
    if(vid && !vid.src){
      vid.src = 'https://drive.usercontent.google.com/download?id=' + intro.id + '&export=download&authuser=0&confirm=t';
      vid.play().catch(function(){});
    }
  }

  if(document.getElementById('archive').classList.contains('visible')){
    updateNodeLabels();
    updateCards();
  }
  console.log('[Drive] 데이터 로드 완료:', JSON.stringify(Object.keys(ndata)));
  ARTISTS.forEach(function(a){ console.log('[Drive] 매칭:', a.name, ndata[a.name]?'OK':'없음'); });
}

(function loadDriveData(){
  if(!DRIVE_SCRIPT_URL) return;
  var cbName = '__driveCallback_' + Date.now();
  window[cbName] = function(data){
    delete window[cbName];
    var el = document.getElementById('__driveScript');
    if(el) el.parentNode.removeChild(el);
    applyDriveData(data);
  };
  var s = document.createElement('script');
  s.id = '__driveScript';
  s.src = DRIVE_SCRIPT_URL + '?callback=' + cbName;
  s.onerror = function(){ console.warn('[Drive] 로드 실패'); };
  document.head.appendChild(s);
})();

// ══════════════════════════════════════════════
//  STARFIELD
// ══════════════════════════════════════════════
const sf=document.getElementById('sf'),sfx=sf.getContext('2d');
function drawSF(){
  sf.width=innerWidth;sf.height=innerHeight;
  for(let i=0;i<320;i++){
    sfx.globalAlpha=Math.random()*.18+.03;sfx.fillStyle='#f2d94e';
    sfx.beginPath();sfx.arc(Math.random()*sf.width,Math.random()*sf.height,Math.random()*.65,0,Math.PI*2);sfx.fill();
  }
  sfx.globalAlpha=1;
}

// ══════════════════════════════════════════════
//  ARCHIVE BEZIER HELPERS
// ══════════════════════════════════════════════



// archive에서도 쓰는 bezier 헬퍼 (trail lines용)
function bezier(ctx,ax,ay,bx,by,b){
  const mx=(ax+bx)/2,my=(ay+by)/2,dx=bx-ax,dy=by-ay;
  const cpx=mx-dy*b,cpy=my+dx*b;
  ctx.beginPath();ctx.moveTo(ax,ay);ctx.quadraticCurveTo(cpx,cpy,bx,by);ctx.stroke();
}
function bezierPt(ax,ay,bx,by,b,t){
  const mx=(ax+bx)/2,my=(ay+by)/2,dx=bx-ax,dy=by-ay;
  const cpx=mx-dy*b,cpy=my+dx*b;
  return{x:(1-t)*(1-t)*ax+2*(1-t)*t*cpx+t*t*bx,y:(1-t)*(1-t)*ay+2*(1-t)*t*cpy+t*t*by};
}

// ══════════════════════════════════════════════
//  ARCHIVE
// ══════════════════════════════════════════════
const ac=document.getElementById('ac'),ax=ac.getContext('2d');
let nodes=[],nodeEls=[];
let view='person',activeMedia=null;
let trailConns=[];   // person mode
let selectedIdx=-1,openIdx=-1;
let mouseX=0,mouseY=0;

// ── Layout generation ──────────────────────────
function randLayout(n,padX,padY,minDist){
  const W=innerWidth,H=innerHeight,pts=[];
  let tries=0;
  while(pts.length<n&&tries<3000){
    tries++;
    const x=padX+Math.random()*(W-padX*2);
    const y=padY+Math.random()*(H-padY*2);
    if(y<90||y>H-70)continue;
    if(x>W-420&&y<140)continue;
    let ok=true;
    for(const p of pts)if(Math.hypot(p[0]-x,p[1]-y)<minDist){ok=false;break;}
    if(ok)pts.push([x,y]);
  }
  return pts;
}

function cardGridLayout(){
  const n=ARTISTS.length;
  const isMobile=innerWidth<768;
  const cols=isMobile?2:6;
  const rows=Math.ceil(n/cols);
  const padX=isMobile?16:80, padY=isMobile?90:110;
  const cardW=120;
  // 전체 너비 기준 셀 간격 계산 후 50%로 줄임, 왼쪽 정렬
  const fullCellW=(innerWidth-padX-50)/cols;
  const gapX=(fullCellW-cardW)*0.5;  // 원래 간격의 50%
  const stepX=cardW+gapX;            // 카드 너비 + 줄인 간격
  const startX=padX+cardW/2;         // 첫 줄 왼쪽 정렬
  const useH=isMobile?rows*190:(innerHeight-padY-80);
  const cellH=isMobile?190:useH/rows;
  return Array.from({length:n},(_,i)=>[
    startX+stepX*(i%cols),
    padY+cellH*Math.floor(i/cols)+cellH/2
  ]);
}

function placeNodes(){
  const pPts = randLayout(ARTISTS.length, 90, 90, 85);
  const gPts = cardGridLayout();
  const mPts = {};
  MEDIA.forEach(m=>{ mPts[m]=gPts; });

  nodes = ARTISTS.map((artist,i)=>{
    const px=pPts[i]?.[0]??innerWidth*.4, py=pPts[i]?.[1]??innerHeight*.5;
    return{
      artist,
      px, py,
      origPx: px, origPy: py,   // 패널 닫힐 때 복원용
      mx: Object.fromEntries(MEDIA.map(m=>[m, mPts[m]?.[i]?.[0]??innerWidth*.5])),
      my: Object.fromEntries(MEDIA.map(m=>[m, mPts[m]?.[i]?.[1]??innerHeight*.5])),
      baseX: px, baseY: py,
      phase: Math.random()*Math.PI*2,
      speed: .22+Math.random()*.18,
      ampX:  5+Math.random()*9,
      ampY:  4+Math.random()*8,
      x: px, y: py,
    };
  });
}

function getTarget(n){
  if(view==='person') return{x:n.px,y:n.py};
  if(activeMedia)     return{x:n.mx[activeMedia],y:n.my[activeMedia]};
  // medium no filter: center cluster
  return{
    x:MEDIA.reduce((s,m)=>s+n.mx[m],0)/MEDIA.length,
    y:MEDIA.reduce((s,m)=>s+n.my[m],0)/MEDIA.length,
  };
}

// ── RAF ───────────────────────────────────────
let lastAT=0;
function archRAF(t){
  const dt=Math.min((t-lastAT)/1000,.05);lastAT=t;
  const ts=t/1000,LERP=.022;
  nodes.forEach(n=>{
    const tg=getTarget(n);
    n.baseX+=(tg.x-n.baseX)*LERP;
    n.baseY+=(tg.y-n.baseY)*LERP;
    n.x=n.baseX+(view==='person'?Math.sin(ts*n.speed+n.phase)*n.ampX:0);
    n.y=n.baseY+(view==='person'?Math.cos(ts*n.speed*.7+n.phase)*n.ampY:0);
  });
  syncNodeEls();
  drawCanvas();
  requestAnimationFrame(archRAF);
}

function syncNodeEls(){
  nodes.forEach((n,i)=>{
    if(!nodeEls[i])return;
    nodeEls[i].style.left=n.x+'px';
    nodeEls[i].style.top=n.y+'px';
  });
}

function drawCanvas(){
  ac.width=innerWidth;ac.height=innerHeight;
  ax.clearRect(0,0,ac.width,ac.height);
  // person mode: trail lines only
  if(view==='person'){
    ax.strokeStyle='#f2d94e';ax.lineWidth=.75;
    trailConns.forEach(c=>{
      const a=nodes[c.from],b=nodes[c.to];if(!a||!b)return;
      ax.globalAlpha=.45;bezier(ax,a.x,a.y,b.x,b.y,c.bend);
      const mp=bezierPt(a.x,a.y,b.x,b.y,c.bend,.5);
      ax.fillStyle='#f2d94e';ax.globalAlpha=.3;
      ax.beginPath();ax.arc(mp.x,mp.y,1.8,0,Math.PI*2);ax.fill();
      ax.globalAlpha=1;
    });
  }
  // medium mode: no lines
}

// ── Node elements ─────────────────────────────
function createNodeEls(){
  const wrap=document.getElementById('nw');wrap.innerHTML='';nodeEls=[];
  nodes.forEach((n,i)=>{
    const el=document.createElement('div');
    el.className='node';
    el.innerHTML=`
      <div class="dot-view">
        <div class="ndot"></div>
        <div class="nnum">${n.artist.num}</div>
        <div class="nname" id="nn${i}">${n.artist.name}</div>
      </div>
      <div class="card-view">
        <div class="card-thumb"><span class="card-ph">—</span></div>
        <div class="card-meta">
          <div class="card-type"></div>
          <div class="card-title"></div>
          <div class="card-name">${n.artist.name}</div>
        </div>
      </div>`;
    el.addEventListener('mouseenter',e=>{ el.classList.add('hot'); if(view==='medium') showThumb(e,n.artist); });
    el.addEventListener('mousemove',e=>{ if(view==='medium') moveThumb(e); });
    el.addEventListener('mouseleave',()=>{ el.classList.remove('hot'); hideThumb(); });
    el.addEventListener('click',()=>handleClick(i));
    wrap.appendChild(el);nodeEls.push(el);
  });
}

function updateCards(){
  nodes.forEach((n,i)=>{
    const el=nodeEls[i];if(!el)return;
    // 포스터 선택 시 정적 포스터 우선 표시
    const works=getWorksForMedia(n.artist,activeMedia);
    const work=works[0]||null;
    const thumb=el.querySelector('.card-thumb');
    if(work?.thumb){
      const img=document.createElement('img');
      img.src=work.thumb;
      img.onload=function(){
        if(img.naturalWidth>img.naturalHeight) img.style.objectFit='contain';
      };
      thumb.innerHTML='';thumb.appendChild(img);
    }else{
      thumb.innerHTML=`<span class="card-ph">${work?.type||'—'}</span>`;
    }
    el.querySelector('.card-type').textContent=
      activeMedia==='포스터'?'포스터·무빙포스터':(work?.type||'');
    el.querySelector('.card-title').textContent=work?.title||'';
  });
}

function updateNodeLabels(){
  nodes.forEach((n,i)=>{
    const el=document.getElementById('nn'+i);
    if(!el)return;
    if(view==='medium'&&activeMedia){
      const work=n.artist.works.find(w=>w.type===activeMedia);
      el.textContent=work?.title&&work.title!=='작품 제목'?work.title:n.artist.name;
    }else{
      el.textContent=n.artist.name;
    }
  });
}

function handleClick(i){
  if(view==='person'){
    // trail: draw connection from previous selected
    if(selectedIdx>=0&&selectedIdx!==i){
      trailConns.push({from:selectedIdx,to:i,bend:(Math.random()-.5)*.4});
    }
    nodeEls.forEach(el=>el.classList.remove('selected'));
    nodeEls[i].classList.add('selected');
    selectedIdx=i;
    openDetail(i);   // ← 우측 패널
  }else{
    openModal(i, activeMedia);  // ← 중앙 모달
  }
}

function _fillDetail(i){
  const artist=nodes[i].artist;
  document.getElementById('det-num').textContent=`— ${artist.num} —`;
  document.getElementById('det-name').textContent=artist.name;
  // 패널에는 영상/포스터만 표시
  const displayWorks=[
    {type:'영상',  fm:null},
    {type:'포스터',fm:'포스터'},
  ];
  document.getElementById('det-works').innerHTML=displayWorks.map(({type,fm})=>{
    const works=fm?getWorksForMedia(artist,fm):artist.works.filter(w=>w.type===type);
    if(!works.length)return'';
    const w=works[0];
    return `<div class="wi" onclick="openWorkModal(${i},0,${fm?`'${fm}'`:'null'})">
      <div class="wthumb">${w.thumb?`<img src="${w.thumb}">`:type}</div>
      <div class="wtype">${type}</div>
      <div class="wtitle">${w.title}</div>
    </div>`;
  }).join('');
}

function pushNodesFromPanel(){
  const boundary=innerWidth-400;
  nodes.forEach(n=>{
    if(n.origPx>boundary) n.px=boundary-20-Math.random()*60;
  });
}
function restoreNodePositions(){
  nodes.forEach(n=>{ n.px=n.origPx; });
}

function openDetail(i){
  const inner=document.getElementById('det-inner');
  const detail=document.getElementById('detail');
  const alreadyOpen=detail.classList.contains('open');
  openIdx=i;

  if(!alreadyOpen) pushNodesFromPanel();

  if(alreadyOpen){
    // 전환 모션: 살짝 페이드 아웃 → 내용 교체 → 페이드 인
    inner.classList.add('fade');
    setTimeout(()=>{
      _fillDetail(i);
      // 패널 스크롤 맨 위로
      detail.scrollTop=0;
      inner.classList.remove('fade');
    },160);
  }else{
    _fillDetail(i);
    detail.classList.add('open');
  }
}

window.openWorkModal=function(artistIdx,workIdx,filterMedia){
  modalArtistIdx=artistIdx;
  modalFilterMedia=filterMedia||null;
  const artist=nodes[artistIdx].artist;
  const works=artist.works.filter(w=>w.type!=='무빙포스터');
  const startIdx=filterMedia?Math.max(0,works.findIndex(w=>w.type===filterMedia)):workIdx;
  modalWorkIdx=startIdx;
  renderModalWork(artist,works,startIdx);
  document.getElementById('modal').classList.add('open');
};
function closeDetail(){
  const detail=document.getElementById('detail');
  detail.classList.remove('open');
  nodeEls[openIdx]?.classList.remove('selected');
  openIdx=-1;
  selectedIdx=-1;
  restoreNodePositions();
}

function clearTrail(){
  trailConns=[];selectedIdx=-1;
  nodeEls.forEach(el=>el.classList.remove('selected'));
}

// ── View & media toggles ──────────────────────
function setView(v){
  view=v;
  document.getElementById('vt-p').classList.toggle('active',v==='person');
  document.getElementById('vt-m').classList.toggle('active',v==='medium');
  document.getElementById('media-filter').classList.toggle('show',v==='medium');
  document.getElementById('archive').classList.toggle('view-medium',v==='medium');
  document.getElementById('archive').classList.toggle('view-person',v==='person');
  if(v==='person'){
    activeMedia=null;
    document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
  }else{
    trailConns=[];selectedIdx=-1;
    nodeEls.forEach(el=>el.classList.remove('selected'));
    setMedia('영상');
    updateCards();
  }
  updateNodeLabels();
  closeDetail(); closeModal();
}

function setMedia(m){
  // 카드 페이드 아웃
  document.querySelectorAll('.card-view').forEach(c=>c.classList.add('fade'));
  setTimeout(()=>{
    if(activeMedia===m){
      activeMedia=null;
      document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
    }else{
      activeMedia=m;
      document.querySelectorAll('.mf-btn').forEach(b=>b.classList.toggle('active',b.dataset.m===m));
    }
    document.getElementById('archive').classList.toggle('poster-mode', activeMedia==='포스터');
    document.getElementById('archive').classList.toggle('video-mode', activeMedia==='영상');
    updateNodeLabels();
    updateCards();
    closeModal();
    requestAnimationFrame(()=>document.querySelectorAll('.card-view').forEach(c=>c.classList.remove('fade')));
  },180);
}

// ── Media works helper ────────────────────────
function getWorksForMedia(artist, m){
  if(m) return artist.works.filter(w=>w.type===m);
  return artist.works.filter(w=>w.type!=='무빙포스터');
}

// ── Hover thumbnail ───────────────────────────
// Small single square — shows the current-medium's work, or primary work
const thumbTip=document.getElementById('thumb-tip');
const ttContent=document.getElementById('ttcontent');

function showThumb(e,artist){
  const work = activeMedia
    ? artist.works.find(w=>w.type===activeMedia)
    : artist.works[0];
  if(work?.thumb){
    ttContent.innerHTML=`<img src="${work.thumb}">`;
  }else{
    ttContent.innerHTML=`<span>${activeMedia||work?.type||'—'}</span>`;
  }
  thumbTip.classList.add('show');
  moveThumb(e);
}
function moveThumb(e){
  let x=e.clientX+14,y=e.clientY-100;
  if(x+92>innerWidth)x=e.clientX-106;
  if(y<4)y=e.clientY+14;
  thumbTip.style.left=x+'px';thumbTip.style.top=y+'px';
}
function hideThumb(){thumbTip.classList.remove('show');}

// ── Centered modal ────────────────────────────
let modalArtistIdx=-1, modalWorkIdx=0, modalFilterMedia=null;

window.toggleMotion=function(container){
  const videoSrc=container.dataset.video;
  const directSrc=container.dataset.direct||'';
  const posterSrc=container.dataset.poster;
  const posterTitle=container.dataset.title||'';
  container.onclick=null;
  container.style.cursor='default';

  function restoreAfterPlay(){
    container.style.width='';
    container.style.height='';
    container.style.overflow='';
    container.innerHTML=`<img src="${posterSrc}" alt="${posterTitle}"><div class="pp-hint">▶</div>`;
    container.dataset.video=videoSrc;
    container.dataset.direct=directSrc;
    container.dataset.poster=posterSrc;
    container.dataset.title=posterTitle;
    container.style.cursor='pointer';
    container.onclick=function(){window.toggleMotion(container);};
  }

  // 포스터 크기 고정 (영상으로 전환 시 레이아웃 유지)
  const fixedW=container.offsetWidth;
  const fixedH=container.offsetHeight;
  container.style.width=fixedW+'px';
  container.style.height=fixedH+'px';
  container.style.overflow='hidden';

  function iframeHTML(src){
    // pointer-events:none → hover 차단 → Drive 컨트롤 자동으로 사라짐
    // 크기는 포스터와 동일하게 유지 (잘리지 않음)
    return `<iframe src="${src}" allow="autoplay" allowfullscreen
      style="width:${fixedW}px;height:${fixedH}px;border:none;display:block;pointer-events:none;"></iframe>`;
  }

  // Drive direct URL로 <video> 재생 (ended 감지 가능, 컨트롤 없음)
  if(directSrc){
    const vid=document.createElement('video');
    vid.autoplay=true;
    vid.controls=false;
    vid.playsInline=true;
    vid.style.cssText=`width:${fixedW}px;height:${fixedH}px;display:block;object-fit:contain;background:#000;`;
    vid.addEventListener('ended',restoreAfterPlay);
    vid.addEventListener('error',function(){
      container.innerHTML=iframeHTML(videoSrc+'?autoplay=1');
    });
    container.innerHTML='';
    container.appendChild(vid);
    vid.src=directSrc;
  }else{
    // 동기적으로 iframe 생성 → 클릭 제스처 유지 → autoplay 허용
    container.innerHTML=iframeHTML(videoSrc+'?autoplay=1');
  }
};

function posterStartIdx(works){
  // 포스터 모달은 무빙포스터(영상)부터 시작
  const i=works.findIndex(w=>w.type==='무빙포스터');
  return i>=0?i:0;
}
function openModal(artistIdx, filterMedia){
  modalArtistIdx=artistIdx;
  modalFilterMedia=filterMedia;
  const artist=nodes[artistIdx].artist;
  // 무빙포스터 제외 전체 작품, 클릭한 미디어 타입 위치에서 시작
  const works=artist.works.filter(w=>w.type!=='무빙포스터');
  const startIdx=Math.max(0,works.findIndex(w=>w.type===filterMedia));
  modalWorkIdx=startIdx;
  renderModalWork(artist, works, startIdx);
  document.getElementById('modal').classList.add('open');
}

function renderModalWork(artist, works, idx){
  const w=works[idx];
  const media=document.getElementById('modal-media');

  // Content
  const isVideo=(w.type==='영상'||w.type==='무빙포스터');
  if(w.type==='포스터'){
    // 포스터: 클릭 시 무빙포스터 인라인 재생 (artist.works에서 탐색)
    const mp=artist.works.find(x=>x.type==='무빙포스터');
    const videoSrc=mp&&mp.src?mp.src:null;
    const directSrc=mp&&mp.directSrc?mp.directSrc:'';
    if(w.thumb&&videoSrc){
      media.innerHTML=`<div class="poster-player" data-video="${videoSrc}" data-direct="${directSrc}" data-poster="${w.thumb}" data-title="${w.title}" onclick="toggleMotion(this)">
        <img src="${w.thumb}" alt="${w.title}">
        <div class="pp-hint">▶</div>
      </div>`;
    }else if(w.thumb){
      media.innerHTML=`<img src="${w.thumb}" alt="${w.title}">`;
    }else{
      media.innerHTML=`<div class="ph">${w.type}</div>`;
    }
  }else if(isVideo&&w.src){
    // 영상/무빙포스터: Drive iframe embed
    const src=w.src.startsWith('https://')
      ? w.src.replace('/view','/preview')
      : `https://drive.google.com/file/d/${w.src}/preview`;
    media.innerHTML=`<iframe src="${src}" allowfullscreen allow="autoplay"></iframe>`;
  }else if(w.thumb){
    media.innerHTML=`<img src="${w.thumb}" alt="${w.title}">`;
  }else{
    media.innerHTML=`<div class="ph">${w.type}</div>`;
  }

  document.getElementById('mi-name').textContent=artist.name;
  document.getElementById('mi-type').textContent=w.type;
  document.getElementById('mi-title').textContent=w.title;

  // Nav dots (display only, no click)
  const nav=document.getElementById('modal-nav');
  nav.innerHTML=works.map((_,i)=>`<div class="mn-dot${i===idx?' active':''}"></div>`).join('');

  // Arrows
  document.getElementById('modal-prev').classList.toggle('hidden', idx===0);
  document.getElementById('modal-next').classList.toggle('hidden', idx===works.length-1);
}

window.stepModal=function(dir){
  const artist=nodes[modalArtistIdx].artist;
  const works=artist.works.filter(w=>w.type!=='무빙포스터');
  const next=modalWorkIdx+dir;
  if(next<0||next>=works.length)return;
  modalWorkIdx=next;
  renderModalWork(artist,works,next);
};

function closeModal(){document.getElementById('modal').classList.remove('open');}
function maybeCloseModal(e){if(e.target===document.getElementById('modal'))closeModal();}

function returnToIntro(){
  closeDetail(); closeModal();
  var arch=document.getElementById('archive');
  arch.classList.remove('visible','view-person','view-medium','poster-mode','video-mode');
  activeMedia=null;
  var enter=document.getElementById('enter');
  enter.classList.remove('show');
  var vid=document.getElementById('intro-vid');
  if(vid){
    vid.loop=false;
    vid.style.display='block';
    vid.style.opacity='1';
    vid.currentTime=0;
    vid.play().catch(function(){});
    var shown=false;
    vid.addEventListener('timeupdate', function onT(){
      if(!shown && vid.currentTime>=8){
        shown=true;
        enter.classList.add('show');
        vid.removeEventListener('timeupdate',onT);
      }
    });
    vid.addEventListener('ended', function(){
      vid.loop=true;
      vid.play().catch(function(){});
    }, {once:true});
  }
  var ui=document.getElementById('ui');
  ui.style.display='';
  ui.style.opacity='1';
}

// ── Intro video ────────────────────────────────
(function(){
  var vid = document.getElementById('intro-vid');
  // 8초에 Enter 표시, 이후 루프
  var enterShown = false;
  vid.addEventListener('timeupdate', function(){
    if(!enterShown && vid.currentTime >= 8){
      enterShown = true;
      document.getElementById('enter').classList.add('show');
    }
  });
  vid.addEventListener('ended', function(){
    vid.loop = true;
    vid.play().catch(function(){});
  }, {once: true});
  // 자동재생 시도 — 차단 시 첫 클릭으로 시작
  vid.play().catch(function(){
    document.body.addEventListener('click', function startVideo(){
      vid.play().catch(function(){});
      document.body.removeEventListener('click', startVideo);
    });
  });
})();

// ── Enter ─────────────────────────────────────
function enterArchive(){
  var vid=document.getElementById('intro-vid');
  document.getElementById('ui').style.opacity='0';
  if(vid){vid.style.opacity='0';}
  setTimeout(()=>{
    document.getElementById('ui').style.display='none';
    if(vid){vid.style.display='none';vid.pause();}
    document.getElementById('archive').classList.add('visible','view-person');
    placeNodes();createNodeEls();
    requestAnimationFrame(archRAF);
  },1000);
}

// ── Events ────────────────────────────────────
document.getElementById('nw').addEventListener('click',e=>{
  if(view==='person'&&e.target===document.getElementById('nw')) closeDetail();
});
window.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
window.addEventListener('resize',()=>{ drawSF(); });
document.getElementById('tl').addEventListener('dblclick',()=>{ enterArchive(); });
document.getElementById('arch-hdr').addEventListener('click',()=>{ returnToIntro(); });
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeDetail(); closeModal(); }
  if(document.getElementById('modal').classList.contains('open')){
    if(e.key==='ArrowLeft') stepModal(-1);
    if(e.key==='ArrowRight') stepModal(1);
  }
});

// 모바일: 모달 스와이프
(function(){
  let tx=0;
  const modal=document.getElementById('modal');
  modal.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  modal.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tx;
    if(Math.abs(dx)>50){stepModal(dx<0?1:-1);}
  },{passive:true});
})();

// ── Init ──────────────────────────────────────
drawSF();
if(location.search.includes('skip')){
